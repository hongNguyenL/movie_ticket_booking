<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - MovieTicket</title>
  <div th:replace="~{fragments/styles :: styles}"></div>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card card">
      <div class="card-header">
        <div class="auth-brand">
          <i class="bi bi-film"></i> MovieTicket
        </div>
        <p class="text-muted mt-2 mb-0">Welcome back! Please sign in.</p>
      </div>
      <div class="card-body">
        <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
          <i class="bi bi-exclamation-circle"></i>
          <span th:text="${session['SPRING_SECURITY_LAST_EXCEPTION']?.message} ?: 'Invalid username or password.'">Invalid credentials</span>
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${param.logout}" class="alert alert-success alert-dismissible fade show" role="alert">
          <i class="bi bi-check-circle"></i> You have been logged out successfully.
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${param.registered}" class="alert alert-success alert-dismissible fade show" role="alert">
          <i class="bi bi-check-circle"></i> Registration successful! Please sign in.
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <form th:action="@{/login}" method="post" class="needs-validation" novalidate>
          <div class="mb-3">
            <label for="username" class="form-label">Username or Email</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" class="form-control form-control-lg" id="username" name="username" placeholder="Enter your username" required autofocus/>
            </div>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control form-control-lg" id="password" name="password" placeholder="Enter your password" required/>
              <button class="btn btn-outline-secondary password-toggle" type="button">
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>
          <div class="mb-3 d-flex justify-content-between align-items-center">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="remember-me" name="remember-me"/>
              <label class="form-check-label" for="remember-me">Remember me</label>
            </div>
            <a th:href="@{/forgot-password}" class="text-decoration-none small">Forgot password?</a>
          </div>
          <button type="submit" class="btn btn-danger btn-lg w-100 mb-3">
            <i class="bi bi-box-arrow-in-right"></i> Sign In
          </button>
          <p class="text-center text-muted mb-0">
            Don't have an account?
            <a th:href="@{/auth/register}" class="text-decoration-none fw-semibold">Register here</a>
          </p>
        </form>
      </div>
    </div>
  </div>
  <div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
