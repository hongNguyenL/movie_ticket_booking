<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Select Seats - MovieTicket</title>
  <div th:replace="~{fragments/styles :: styles}"></div>
  <style>
    .seat-grid { display: flex; flex-direction: column; gap: 6px; padding: 20px; }
    .seat-row { display: flex; align-items: center; gap: 6px; }
    .seat-label { width: 24px; text-align: center; font-weight: 700; font-size: 13px; color: #666; }
    .seat { width: 38px; height: 38px; border-radius: 8px 8px 4px 4px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; transition: all 0.15s; border: 2px solid transparent; user-select: none; }
    .seat.available { background: #e8f5e9; border-color: #a5d6a7; color: #2e7d32; }
    .seat.available:hover { background: #c8e6c9; border-color: #66bb6a; }
    .seat.selected { background: #1565c0; border-color: #0d47a1; color: #fff; }
    .seat.booked { background: #ef5350; border-color: #c62828; color: #fff; cursor: not-allowed; opacity: 0.7; }
    .seat.vip.available { background: #fff3e0; border-color: #ffb74d; color: #e65100; }
    .seat.vip.available:hover { background: #ffe0b2; border-color: #ff9800; }
    .seat.vip.selected { background: #e65100; border-color: #bf360c; color: #fff; }
    .cinema-screen { background: #e0e0e0; height: 12px; border-radius: 50% 50% 0 0; width: 60%; margin: 0 auto 20px; text-align: center; font-size: 11px; color: #666; padding-top: 2px; }
    .seat-legend { display: flex; gap: 20px; justify-content: center; margin-top: 16px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; }
    .legend-item .seat { width: 20px; height: 20px; cursor: default; }
    .booking-steps { display: flex; justify-content: center; gap: 8px; }
    .step { display: flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 20px; background: #f5f5f5; color: #999; font-size: 14px; }
    .step.active { background: #dc3545; color: #fff; }
    .step.completed { background: #e8f5e9; color: #2e7d32; }
    .step-number { width: 24px; height: 24px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; background: rgba(0,0,0,0.1); }
    .step.active .step-number, .step.completed .step-number { background: rgba(255,255,255,0.3); }
  </style>
</head>
<body>
  <div th:replace="~{fragments/header :: header}"></div>

  <div class="page-header">
    <div class="container">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-0">
          <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none">Home</a></li>
          <li class="breadcrumb-item"><a th:href="@{/movies/{id}(id=${movie.id})}" class="text-decoration-none" th:text="${movie.title}">Movie</a></li>
          <li class="breadcrumb-item active">Select Seats</li>
        </ol>
      </nav>
    </div>
  </div>

  <main class="container mb-5">
    <div class="booking-steps mb-5">
      <div class="step completed">
        <span class="step-number"><i class="bi bi-check"></i></span> Movie &amp; Time
      </div>
      <div class="step active">
        <span class="step-number">2</span> Select Seats
      </div>
      <div class="step">
        <span class="step-number">3</span> Checkout
      </div>
    </div>

    <div class="row g-4">
      <div class="col-lg-8">
        <div class="card shadow-sm">
          <div class="card-body">
            <div class="cinema-screen">SCREEN</div>
            <div class="seat-grid">
              <th:block th:each="rowEntry : ${seatsByRow}">
                <div class="seat-row">
                  <span class="seat-label" th:text="${rowEntry.key}">A</span>
                  <th:block th:each="seat : ${rowEntry.value}">
                    <div th:class="'seat ' + (${seat.available} ? 'available' : 'booked') + (${seat.seatType == 'VIP' or seat.seatType == 'COUPLE'} ? ' vip' : '')"
                         th:data-sid="${seat.id}" th:data-stype="${seat.seatType}" th:data-slabel="${seat.rowLabel + seat.seatNumber}"
                         th:text="${seat.seatNumber}">1</div>
                  </th:block>
                </div>
              </th:block>
            </div>
            <div class="seat-legend">
              <div class="legend-item"><div class="seat available"></div> Available</div>
              <div class="legend-item"><div class="seat selected"></div> Selected</div>
              <div class="legend-item"><div class="seat booked"></div> Booked</div>
              <div class="legend-item"><div class="seat vip available"></div> VIP</div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="card shadow-sm">
          <div class="card-header bg-white">
            <h5 class="fw-bold mb-0"><i class="bi bi-receipt"></i> Booking Summary</h5>
          </div>
          <div class="card-body">
            <div class="mb-3">
              <small class="text-muted d-block">Movie</small>
              <span class="fw-semibold" th:text="${movie.title}">Movie Title</span>
            </div>
            <div class="mb-3">
              <small class="text-muted d-block">Cinema</small>
              <span class="fw-semibold" th:text="${cinema?.name ?: 'N/A'}">Cinema</span>
            </div>
            <div class="mb-3">
              <small class="text-muted d-block">Hall</small>
              <span class="fw-semibold" th:text="${showtime.hall?.name}">Hall</span>
            </div>
            <div class="mb-3">
              <small class="text-muted d-block">Showtime</small>
              <span class="fw-semibold" th:text="${showtime.startTime != null ? #temporals.format(showtime.startTime, 'EEE, MMM dd, yyyy hh:mm a') : 'N/A'}">Showtime</span>
            </div>
            <hr/>
            <div class="seat-summary">
              <div class="d-flex justify-content-between mb-2">
                <span>Selected Seats:</span>
                <span class="fw-bold" id="selectedCount">0</span>
              </div>
              <div class="d-flex justify-content-between mb-2">
                <span>Total Price:</span>
                <span class="fw-bold fs-5 text-danger" id="totalPrice">$0.00</span>
              </div>
              <div class="small text-muted mt-2">
                <i class="bi bi-info-circle"></i> Seats: <span id="selectedSeatsList">None</span>
              </div>
            </div>
            <div sec:authorize="isAuthenticated()">
              <form th:action="@{/booking/create}" method="post" class="mt-3" id="bookingForm">
                <input type="hidden" name="showtimeId" th:value="${showtime.id}"/>
                <div id="seatIdsContainer"></div>

                <button type="submit" class="btn btn-danger w-100 btn-lg" id="continueBtn" disabled>
                  <i class="bi bi-arrow-right-circle"></i> Continue to Checkout
                </button>
              </form>
            </div>
            <div sec:authorize="!isAuthenticated()" class="mt-3 text-center">
              <a th:href="@{/login}" class="btn btn-danger btn-lg w-100">
                <i class="bi bi-box-arrow-in-right"></i> Login to Book Seats
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div th:replace="~{fragments/footer :: footer}"></div>
  <div th:replace="~{fragments/scripts :: scripts}"></div>
  <script>
    var BP = /*[[${seatPrice}]]*/ 10.0;
    var selected = {};

    document.querySelector('.seat-grid').addEventListener('click', function(e) {
      var seat = e.target.closest('.seat');
      if (!seat || seat.classList.contains('booked')) return;
      var id = seat.getAttribute('data-sid');
      if (seat.classList.contains('selected')) {
        seat.classList.remove('selected');
        seat.classList.add('available');
        delete selected[id];
      } else {
        seat.classList.remove('available');
        seat.classList.add('selected');
        selected[id] = seat;
      }
      updateSummary();
    });

    function getPrice(type) {
      if (type === 'VIP') return BP * 1.5;
      if (type === 'COUPLE') return BP * 2.0;
      return BP;
    }

    function updateSummary() {
      var ids = Object.keys(selected);
      var count = ids.length;
      var total = 0;
      var labels = [];
      for (var i = 0; i < ids.length; i++) {
        var s = selected[ids[i]];
        total += getPrice(s.getAttribute('data-stype'));
        labels.push(s.getAttribute('data-slabel'));
      }
      document.getElementById('selectedCount').textContent = count;
      document.getElementById('totalPrice').textContent = '$' + total.toFixed(2);
      document.getElementById('selectedSeatsList').textContent = count ? labels.join(', ') : 'None';
      var container = document.getElementById('seatIdsContainer');
      container.innerHTML = '';
      for (var i = 0; i < ids.length; i++) {
        var inp = document.createElement('input');
        inp.type = 'hidden';
        inp.name = 'seatIds';
        inp.value = ids[i];
        container.appendChild(inp);
      }
      document.getElementById('continueBtn').disabled = count === 0;
    }
  </script>
</body>
</html>
