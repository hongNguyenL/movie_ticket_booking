<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Booking Confirmed - MovieTicket</title>
  <div th:replace="~{fragments/styles :: styles}"></div>
</head>
<body>
  <div th:replace="~{fragments/header :: header}"></div>

  <main class="container mb-5 mt-5">
    <div class="row justify-content-center">
      <div class="col-lg-6 text-center">
        <div class="mb-4">
          <div class="d-inline-flex align-items-center justify-content-center bg-success rounded-circle" style="width: 100px; height: 100px;">
            <i class="bi bi-check2-circle text-white" style="font-size: 3rem;"></i>
          </div>
        </div>
        <h2 class="fw-bold mb-2">Booking Confirmed!</h2>
        <p class="text-muted mb-4">Your tickets have been booked successfully.</p>

        <div class="card shadow-sm mb-4">
          <div class="card-body">
            <div class="mb-3">
              <small class="text-muted d-block">Booking Reference</small>
              <span class="fw-bold fs-4" th:text="${booking.bookingReference}">REF123456</span>
            </div>
            <hr/>
            <div class="row text-start g-3">
              <div class="col-sm-6">
                <small class="text-muted d-block">Movie</small>
                <span class="fw-semibold" th:text="${booking.showtime?.movie?.title}">Movie</span>
              </div>
              <div class="col-sm-6">
                <small class="text-muted d-block">Cinema</small>
                <span class="fw-semibold" th:text="${booking.showtime?.cinema?.name}">Cinema</span>
              </div>
              <div class="col-sm-6">
                <small class="text-muted d-block">Date</small>
                <span class="fw-semibold" th:text="${#temporals.format(booking.showtime?.startTime, 'EEE, MMM dd, yyyy')}">Date</span>
              </div>
              <div class="col-sm-6">
                <small class="text-muted d-block">Time</small>
                <span class="fw-semibold" th:text="${#temporals.format(booking.showtime?.startTime, 'hh:mm a')}">Time</span>
              </div>
              <div class="col-sm-6">
                <small class="text-muted d-block">Seats</small>
                <span class="fw-semibold">
                  <span th:each="seat, iter : ${booking.seats}" th:text="${seat.seatNumber}" th:remove="tag">A1</span><span th:unless="${iter.last}">, </span>
                </span>
              </div>
              <div class="col-sm-6">
                <small class="text-muted d-block">Total Paid</small>
                <span class="fw-bold fs-5 text-danger" th:text="${#numbers.formatDecimal(booking.totalPrice, 1, 2)}">$0.00</span>
              </div>
            </div>
          </div>
        </div>

        <div class="d-flex justify-content-center gap-3">
          <a th:href="@{/customer/bookings/{id}(id=${booking.id})}" class="btn btn-danger btn-lg">
            <i class="bi bi-ticket-detailed"></i> View Booking Details
          </a>
          <a th:href="@{/movies}" class="btn btn-outline-secondary btn-lg">
            <i class="bi bi-collection-play"></i> Book Another
          </a>
        </div>
      </div>
    </div>
  </main>

  <div th:replace="~{fragments/footer :: footer}"></div>
  <div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
