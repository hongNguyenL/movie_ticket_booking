<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${movie.title} + ' - MovieTicket'">Movie Detail - MovieTicket</title>
  <div th:replace="~{fragments/styles :: styles}"></div>
</head>
<body>
  <div th:replace="~{fragments/header :: header}"></div>

  <div class="page-header">
    <div class="container">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-0">
          <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none">Home</a></li>
          <li class="breadcrumb-item"><a th:href="@{/movies}" class="text-decoration-none">Movies</a></li>
          <li class="breadcrumb-item active" th:text="${movie.title}">Movie</li>
        </ol>
      </nav>
    </div>
  </div>

  <main class="container mb-5">
    <!-- Movie Info -->
    <div class="row g-4 mb-5">
      <div class="col-lg-4">
        <img th:src="${movie.posterUrl} ?: @{/images/placeholder-poster.svg}" class="img-fluid rounded-4 shadow" th:alt="${movie.title}" style="width: 100%;"/>
      </div>
      <div class="col-lg-8">
        <h1 class="fw-bold mb-2" th:text="${movie.title}">Movie Title</h1>
        <div class="d-flex flex-wrap gap-3 mb-3">
          <span class="badge bg-danger" th:if="${movie.genre}" th:text="${movie.genre}">Action</span>
          <span class="badge bg-secondary" th:text="${movie.language}">English</span>
          <span class="badge bg-warning text-dark"><i class="bi bi-star-fill"></i> <span th:text="${movie.rating}">0.0</span></span>
          <span class="text-muted"><i class="bi bi-clock"></i> <span th:text="${movie.duration}">0</span> min</span>
          <span class="text-muted" th:if="${movie.releaseDate}"><i class="bi bi-calendar"></i> <span th:text="${#temporals.format(movie.releaseDate, 'MMM dd, yyyy')}">Release</span></span>
        </div>
        <p class="text-muted" th:text="${movie.description}">Description...</p>

        <div class="row g-3 mb-4">
          <div class="col-md-6" th:if="${movie.directorName}">
            <div class="card bg-light border-0">
              <div class="card-body py-2">
                <small class="text-muted d-block">Director</small>
                <span class="fw-semibold" th:text="${movie.directorName}">Director Name</span>
              </div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="card bg-light border-0">
              <div class="card-body py-2">
                <small class="text-muted d-block">Cast</small>
                <span th:if="${movie.actors != null and !movie.actors.isEmpty()}">
                  <th:block th:each="actor, iter : ${movie.actors}"><span th:text="${actor.name}" th:remove="tag">Actor</span><span th:unless="${iter.last}">, </span></th:block>
                </span>
                <span th:unless="${movie.actors != null and !movie.actors.isEmpty()}" class="text-muted">N/A</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Showtime Selection -->
    <section class="mb-5" th:if="${movie.active}">
      <h3 class="fw-bold mb-4"><i class="bi bi-clock-history"></i> Choose Showtime</h3>

      <form th:action="@{/movies/{id}(id=${movie.id})}" method="get" id="showtimeForm">
        <input type="hidden" name="movieId" th:value="${movie.id}"/>

        <div class="row g-3">
          <!-- Cinema Selection -->
          <div class="col-md-4">
            <label class="form-label fw-semibold">Select Cinema</label>
            <select class="form-select" name="cinemaId" id="cinemaSelect" required onchange="this.form.submit()">
              <option value="">Choose a cinema...</option>
              <option th:each="cinema : ${cinemas}" th:value="${cinema.id}" th:text="${cinema.name}" th:selected="${param.cinemaId != null and param.cinemaId[0] == cinema.id.toString()}"></option>
            </select>
          </div>

          <!-- Date Selection -->
          <div class="col-md-4" th:if="${dates != null}">
            <label class="form-label fw-semibold">Select Date</label>
            <select class="form-select" name="date" id="dateSelect" required onchange="this.form.submit()">
              <option value="">Choose a date...</option>
              <option th:each="date : ${dates}" th:value="${date}" th:text="${#temporals.format(date, 'EEE, MMM dd, yyyy')}" th:selected="${param.date != null and param.date[0] == date.toString()}"></option>
            </select>
          </div>

          <!-- Showtime Selection -->
          <div class="col-md-4" th:if="${showtimes != null}">
            <label class="form-label fw-semibold">Select Showtime</label>
            <select class="form-select" name="showtimeId" id="showtimeSelect" required>
              <option value="">Choose a showtime...</option>
              <option th:each="showtime : ${showtimes}" th:value="${showtime.id}">
                <span th:text="${showtime.startTime != null ? #temporals.format(showtime.startTime, 'hh:mm a') : 'N/A'}">00:00</span> - <span th:text="${showtime.hall?.name}">Hall</span>
              </option>
            </select>
          </div>
        </div>

        <div class="mt-3" th:if="${showtimes != null}">
          <button type="submit" class="btn btn-danger btn-lg" id="selectSeatsBtn" disabled>
            <i class="bi bi-grid-3x3-gap-fill"></i> Select Seats
          </button>
          <script>
            document.getElementById('showtimeSelect')?.addEventListener('change', function() {
              document.getElementById('selectSeatsBtn').disabled = !this.value;
            });
          </script>
        </div>
      </form>
    </section>

    <!-- Actors List -->
    <section class="mb-5" th:if="${movie.actors != null and !movie.actors.isEmpty()}">
      <h3 class="fw-bold mb-4"><i class="bi bi-people"></i> Cast</h3>
      <div class="row g-3">
        <div class="col-lg-2 col-md-3 col-4" th:each="actor : ${movie.actors}">
          <div class="text-center">
            <img th:src="${actor.photo} ?: @{/images/placeholder-actor.svg}" class="rounded-circle mb-2" style="width: 80px; height: 80px; object-fit: cover;" th:alt="${actor.name}"/>
            <div class="small fw-semibold" th:text="${actor.name}">Actor</div>
            <div class="small text-muted" th:if="${actor.roleName}" th:text="${actor.roleName}">Role</div>
          </div>
        </div>
      </div>
    </section>

    <!-- Reviews Section -->
    <section class="mb-5" th:if="${reviews != null}">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold mb-0"><i class="bi bi-chat-quote"></i> Reviews</h3>
      </div>

      <div th:if="${reviews.isEmpty()}">
        <p class="text-muted">No reviews yet. Be the first to review!</p>
      </div>

      <div th:each="review : ${reviews}" class="card review-card">
        <div class="card-body">
          <div class="d-flex gap-3">
            <div class="review-avatar flex-shrink-0" th:text="${#strings.substring(review.userName, 0, 1)}">U</div>
            <div class="flex-grow-1">
              <div class="d-flex justify-content-between">
                <div>
                  <span class="fw-semibold" th:text="${review.userName}">User</span>
                  <span class="text-muted small ms-2" th:text="${#temporals.format(review.createdAt, 'MMM dd, yyyy')}">Date</span>
                </div>
                <div class="star-rating">
                  <i class="bi bi-star-fill" th:each="i : ${#numbers.sequence(1, 5)}" th:classappend="${i <= review.rating} ? 'text-warning' : 'text-secondary'"></i>
                </div>
              </div>
              <p class="mb-0 mt-1" th:if="${review.comment}" th:text="${review.comment}">Comment...</p>

              <div sec:authorize="isAuthenticated()">
                <div th:if="${#authentication.principal.id == review.userId}" class="mt-2">
                  <button class="btn btn-sm btn-outline-primary me-1" th:onclick="'toggleEditForm(' + ${review.id} + ')'">
                    <i class="bi bi-pencil"></i> Edit
                  </button>
                  <form th:action="@{/reviews/{id}/delete(id=${review.id})}" method="post" style="display:inline">
                    <input type="hidden" name="movieId" th:value="${movie.id}"/>
                    <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete this review?')">
                      <i class="bi bi-trash"></i> Delete
                    </button>
                  </form>
                </div>
              </div>

              <div class="mt-3 pt-3 border-top" th:id="'edit-form-' + ${review.id}" style="display:none">
                <form th:action="@{/reviews/{id}/edit(id=${review.id})}" method="post">
                  <input type="hidden" name="movieId" th:value="${movie.id}"/>
                  <div class="mb-2">
                    <label class="form-label small">Rating</label>
                    <div class="edit-star-rating" th:id="'stars-' + ${review.id}">
                      <i class="bi bi-star star" data-value="1" th:onclick="'setEditRating(' + ${review.id} + ', 1)'"></i>
                      <i class="bi bi-star star" data-value="2" th:onclick="'setEditRating(' + ${review.id} + ', 2)'"></i>
                      <i class="bi bi-star star" data-value="3" th:onclick="'setEditRating(' + ${review.id} + ', 3)'"></i>
                      <i class="bi bi-star star" data-value="4" th:onclick="'setEditRating(' + ${review.id} + ', 4)'"></i>
                      <i class="bi bi-star star" data-value="5" th:onclick="'setEditRating(' + ${review.id} + ', 5)'"></i>
                      <input type="hidden" name="rating" class="edit-rating-value" th:value="${review.rating}"/>
                    </div>
                  </div>
                  <div class="mb-2">
                    <textarea class="form-control form-control-sm" name="comment" rows="2" th:text="${review.comment}"></textarea>
                  </div>
                  <button type="submit" class="btn btn-sm btn-primary me-1"><i class="bi bi-check"></i> Save</button>
                  <button type="button" class="btn btn-sm btn-secondary" th:onclick="'toggleEditForm(' + ${review.id} + ')'">Cancel</button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Add Review Form -->
      <div class="card mt-4" sec:authorize="isAuthenticated()">
        <div class="card-header bg-white fw-semibold">
          <i class="bi bi-pencil-square"></i> Write a Review
        </div>
        <div class="card-body">
          <form th:action="@{/reviews/create}" method="post" th:object="${reviewRequest}">
            <input type="hidden" name="movieId" th:value="${movie.id}"/>
            <div class="mb-3">
              <label class="form-label">Rating</label>
              <div class="star-rating-input" id="starRating">
                <i class="bi bi-star star" data-value="1" onclick="setRating(1)"></i>
                <i class="bi bi-star star" data-value="2" onclick="setRating(2)"></i>
                <i class="bi bi-star star" data-value="3" onclick="setRating(3)"></i>
                <i class="bi bi-star star" data-value="4" onclick="setRating(4)"></i>
                <i class="bi bi-star star" data-value="5" onclick="setRating(5)"></i>
                <input type="hidden" name="rating" id="ratingValue"/>
              </div>
            </div>
            <div class="mb-3">
              <label for="comment" class="form-label">Your Review</label>
              <textarea class="form-control" id="comment" name="comment" rows="3" placeholder="Share your thoughts about this movie..."></textarea>
            </div>
            <button type="submit" class="btn btn-danger">
              <i class="bi bi-send"></i> Submit Review
            </button>
          </form>
        </div>
      </div>
      <div class="text-center mt-4" sec:authorize="!isAuthenticated()">
        <a th:href="@{/login}"><i class="bi bi-box-arrow-in-right"></i> Login to write a review</a>
      </div>
    </section>
  </main>

  <div th:replace="~{fragments/footer :: footer}"></div>
  <div th:replace="~{fragments/scripts :: scripts}"></div>
  <script>
    function setRating(val) {
      document.getElementById('ratingValue').value = val;
      document.querySelectorAll('#starRating .star').forEach(star => {
        const v = parseInt(star.dataset.value);
        star.className = v <= val ? 'bi bi-star-fill star active' : 'bi bi-star star';
      });
    }

    function toggleEditForm(id) {
      const form = document.getElementById('edit-form-' + id);
      if (!form) return;
      const visible = form.style.display !== 'none';
      form.style.display = visible ? 'none' : 'block';
      if (!visible) {
        const input = form.querySelector('.edit-rating-value');
        const rating = parseInt(input.value) || 0;
        form.querySelectorAll('.star').forEach(star => {
          const v = parseInt(star.dataset.value);
          star.className = v <= rating ? 'bi bi-star-fill star active' : 'bi bi-star star';
        });
      }
    }

    function setEditRating(id, val) {
      const container = document.getElementById('stars-' + id);
      container.querySelector('.edit-rating-value').value = val;
      container.querySelectorAll('.star').forEach(star => {
        const v = parseInt(star.dataset.value);
        star.className = v <= val ? 'bi bi-star-fill star active' : 'bi bi-star star';
      });
    }
  </script>
</body>
</html>
