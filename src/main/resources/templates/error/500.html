<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Server Error - MovieTicket</title>
  <div th:replace="~{fragments/styles :: styles}"></div>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh; background: #f8f9fa;">
  <div class="container text-center">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="mb-4">
          <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 5rem;"></i>
        </div>
        <h1 class="display-1 fw-bold text-danger">500</h1>
        <h2 class="fw-semibold mb-3">Server Error</h2>
        <p class="text-muted mb-4" th:text="${error} ?: 'Something went wrong on our end. We are working to fix the issue. Please try again later.'">
          Something went wrong on our end.
        </p>
        <div class="d-flex justify-content-center gap-3">
          <a th:href="@{/}" class="btn btn-primary btn-lg">
            <i class="bi bi-house-door"></i> Go Home
          </a>
          <button onclick="location.reload()" class="btn btn-outline-secondary btn-lg">
            <i class="bi bi-arrow-clockwise"></i> Try Again
          </button>
        </div>
        <div class="mt-4" th:if="${#authorization.expression('hasRole(''ADMIN'')') and message != null}">
          <div class="card border-danger">
            <div class="card-header bg-danger text-white">Error Details</div>
            <div class="card-body">
              <p class="text-muted small mb-0" th:text="${message}">Error message</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
