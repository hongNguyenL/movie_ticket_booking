<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Access Denied - MovieTicket</title>
  <div th:replace="~{fragments/styles :: styles}"></div>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh; background: #f8f9fa;">
  <div class="container text-center">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="mb-4">
          <i class="bi bi-shield-lock-fill text-danger" style="font-size: 5rem;"></i>
        </div>
        <h1 class="display-1 fw-bold text-danger">403</h1>
        <h2 class="fw-semibold mb-3">Access Denied</h2>
        <p class="text-muted mb-4" th:text="${error} ?: 'You do not have permission to access this page. Please contact an administrator if you believe this is a mistake.'">
          You do not have permission to access this page.
        </p>
        <div class="d-flex justify-content-center gap-3">
          <a th:href="@{/}" class="btn btn-primary btn-lg">
            <i class="bi bi-house-door"></i> Go Home
          </a>
          <a th:href="@{/login}" class="btn btn-outline-secondary btn-lg">
            <i class="bi bi-box-arrow-in-right"></i> Login
          </a>
        </div>
      </div>
    </div>
  </div>
  <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
