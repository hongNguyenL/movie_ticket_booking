<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Not Found - MovieTicket</title>
  <div th:replace="~{fragments/styles :: styles}"></div>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh; background: #f8f9fa;">
  <div class="container text-center">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="mb-4">
          <i class="bi bi-camera-reels text-warning" style="font-size: 5rem;"></i>
        </div>
        <h1 class="display-1 fw-bold text-warning">404</h1>
        <h2 class="fw-semibold mb-3">Page Not Found</h2>
        <p class="text-muted mb-4" th:text="${error} ?: 'The page you are looking for does not exist or has been moved. It might be a broken link or a removed page.'">
          The page you are looking for does not exist.
        </p>
        <div class="d-flex justify-content-center gap-3">
          <a th:href="@{/}" class="btn btn-primary btn-lg">
            <i class="bi bi-house-door"></i> Go Home
          </a>
          <a th:href="@{/movies}" class="btn btn-outline-danger btn-lg">
            <i class="bi bi-collection-play"></i> Browse Movies
          </a>
        </div>
      </div>
    </div>
  </div>
  <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
