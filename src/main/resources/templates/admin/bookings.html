<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Bookings - MovieTicket</title>
  <div th:replace="~{fragments/styles :: styles}"></div>
</head>
<body>
  <div th:replace="~{fragments/header :: header}"></div>

  <div class="container-fluid">
    <div class="row">
      <nav class="col-lg-2 d-none d-lg-block admin-sidebar">
        <div class="nav flex-column">
          <a class="nav-link" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
          <a class="nav-link" th:href="@{/admin/movies}"><i class="bi bi-film"></i> Movies</a>
          <a class="nav-link" th:href="@{/admin/cinemas}"><i class="bi bi-building"></i> Cinemas</a>
          <a class="nav-link" th:href="@{/admin/showtimes}"><i class="bi bi-clock"></i> Showtimes</a>
          <a class="nav-link active" th:href="@{/admin/bookings}"><i class="bi bi-ticket"></i> Bookings</a>
          <a class="nav-link" th:href="@{/admin/customers}"><i class="bi bi-people"></i> Customers</a>
          <a class="nav-link" th:href="@{/admin/reviews}"><i class="bi bi-chat-quote"></i> Reviews</a>
          <a class="nav-link" th:href="@{/admin/reports}"><i class="bi bi-bar-chart"></i> Reports</a>
        </div>
      </nav>

      <main class="col-lg-10 ms-auto px-4 py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h3 class="fw-bold mb-0"><i class="bi bi-ticket"></i> All Bookings</h3>
        </div>

        <!-- Filters -->
        <div class="card shadow-sm mb-4">
          <div class="card-body">
            <form th:action="@{/admin/bookings}" method="get" class="row g-2">
              <div class="col-md-3">
                <input type="text" class="form-control" name="q" placeholder="Search reference or customer..." th:value="${param.q}"/>
              </div>
              <div class="col-md-2">
                <select class="form-select" name="status">
                  <option value="">All Status</option>
                  <option value="CONFIRMED" th:selected="${param.status != null and param.status[0] == 'CONFIRMED'}">Confirmed</option>
                  <option value="PENDING" th:selected="${param.status != null and param.status[0] == 'PENDING'}">Pending</option>
                  <option value="CANCELLED" th:selected="${param.status != null and param.status[0] == 'CANCELLED'}">Cancelled</option>
                </select>
              </div>
              <div class="col-md-2">
                <select class="form-select" name="paymentStatus">
                  <option value="">Payment</option>
                  <option value="PAID" th:selected="${param.paymentStatus != null and param.paymentStatus[0] == 'PAID'}">Paid</option>
                  <option value="PENDING" th:selected="${param.paymentStatus != null and param.paymentStatus[0] == 'PENDING'}">Pending</option>
                  <option value="REFUNDED" th:selected="${param.paymentStatus != null and param.paymentStatus[0] == 'REFUNDED'}">Refunded</option>
                </select>
              </div>
              <div class="col-md-3">
                <button class="btn btn-danger w-100" type="submit"><i class="bi bi-search"></i> Search</button>
              </div>
              <div class="col-md-2">
                <a th:href="@{/admin/bookings}" class="btn btn-outline-secondary w-100">Clear</a>
              </div>
            </form>
          </div>
        </div>

        <div class="card shadow-sm">
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover mb-0">
                <thead class="table-light">
                  <tr>
                    <th>Booking #</th>
                    <th>Customer</th>
                    <th>Movie</th>
                    <th>Cinema</th>
                    <th>Showtime</th>
                    <th>Seats</th>
                    <th>Amount</th>
                    <th>Status</th>
                    <th>Payment</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="booking : ${bookings}">
                    <td class="fw-semibold" th:text="${booking.bookingReference}">REF</td>
                    <td th:text="${booking.bookingReference}">REF</td>
                    <td th:text="${booking.movie?.title}">Movie</td>
                    <td th:text="${booking.cinema?.name}">Cinema</td>
                    <td th:text="${#temporals.format(booking.showtimeStart, 'MMM dd, hh:mm a')}">Showtime</td>
                    <td th:text="${booking.seats?.size() ?: 0}">2</td>
                    <td th:text="${#numbers.formatDecimal(booking.totalPrice, 1, 2)}">$0.00</td>
                    <td>
                      <span class="badge" th:classappend="${booking.status == 'CONFIRMED'} ? 'bg-success' : (${booking.status == 'CANCELLED'} ? 'bg-danger' : 'bg-warning text-dark')" th:text="${booking.status}">Status</span>
                    </td>
                    <td>
                      <span class="badge" th:classappend="${booking.payment?.status == 'PAID'} ? 'bg-success' : (${booking.payment?.status == 'REFUNDED'} ? 'bg-info' : 'bg-warning text-dark')" th:text="${booking.payment?.status ?: 'N/A'}">Payment</span>
                    </td>
                    <td>
                        <a th:href="@{/admin/bookings/{id}(id=${booking.id})}" class="btn btn-sm btn-outline-primary disabled"><i class="bi bi-eye"></i></a>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- Pagination -->
        <nav class="mt-4" th:if="${totalPages > 1}">
          <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${first} ? 'disabled'"><a class="page-link" th:href="@{/admin/bookings(page=0, q=${param.q}, status=${param.status}, paymentStatus=${param.paymentStatus})}"><i class="bi bi-chevron-double-left"></i></a></li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == number} ? 'active'"><a class="page-link" th:href="@{/admin/bookings(page=${i}, q=${param.q}, status=${param.status}, paymentStatus=${param.paymentStatus})}" th:text="${i+1}"></a></li>
            <li class="page-item" th:classappend="${last} ? 'disabled'"><a class="page-link" th:href="@{/admin/bookings(page=${totalPages - 1}, q=${param.q}, status=${param.status}, paymentStatus=${param.paymentStatus})}"><i class="bi bi-chevron-double-right"></i></a></li>
          </ul>
        </nav>
      </main>
    </div>
  </div>

  <div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
