<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Reviews - MovieTicket</title>
  <div th:replace="~{fragments/styles :: styles}"></div>
</head>
<body>
  <div th:replace="~{fragments/header :: header}"></div>

  <div class="container-fluid">
    <div class="row">
      <nav class="col-lg-2 d-none d-lg-block admin-sidebar">
        <div class="nav flex-column">
          <a class="nav-link" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
          <a class="nav-link" th:href="@{/admin/movies}"><i class="bi bi-film"></i> Movies</a>
          <a class="nav-link" th:href="@{/admin/cinemas}"><i class="bi bi-building"></i> Cinemas</a>
          <a class="nav-link" th:href="@{/admin/showtimes}"><i class="bi bi-clock"></i> Showtimes</a>
          <a class="nav-link" th:href="@{/admin/bookings}"><i class="bi bi-ticket"></i> Bookings</a>
          <a class="nav-link" th:href="@{/admin/customers}"><i class="bi bi-people"></i> Customers</a>
          <a class="nav-link active" th:href="@{/admin/reviews}"><i class="bi bi-chat-quote"></i> Reviews</a>
          <a class="nav-link" th:href="@{/admin/reports}"><i class="bi bi-bar-chart"></i> Reports</a>
        </div>
      </nav>

      <main class="col-lg-10 ms-auto px-4 py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h3 class="fw-bold mb-0"><i class="bi bi-chat-quote"></i> Reviews</h3>
          <div class="d-flex gap-2">
            <a th:href="@{/admin/reviews(pending=true)}" class="btn btn-outline-warning" th:classappend="${param.pending != null} ? 'active'">
              <i class="bi bi-clock"></i> Pending Approval
            </a>
          </div>
        </div>

        <div class="card shadow-sm">
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover mb-0">
                <thead class="table-light">
                  <tr>
                    <th>ID</th>
                    <th>Movie</th>
                    <th>User</th>
                    <th>Rating</th>
                    <th>Comment</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="review : ${reviews}">
                    <td th:text="${review.id}">1</td>
                    <td class="fw-semibold" th:text="${review.movieTitle}">Movie</td>
                    <td th:text="${review.userName}">User</td>
                    <td>
                      <span class="text-warning" th:each="i : ${#numbers.sequence(1, 5)}">
                        <i class="bi" th:classappend="${i <= review.rating} ? 'bi-star-fill' : 'bi-star'"></i>
                      </span>
                    </td>
                    <td>
                      <span th:text="${#strings.abbreviate(review.comment, 60)}">Comment...</span>
                    </td>
                    <td th:text="${#temporals.format(review.createdAt, 'MMM dd, yyyy')}">Date</td>
                    <td>
                      <span class="badge" th:classappend="${review.approved} ? 'bg-success' : 'bg-warning text-dark'">
                        <span th:text="${review.approved} ? 'Approved' : 'Pending'">Status</span>
                      </span>
                    </td>
                    <td>
                      <div class="d-flex gap-1">
                        <form th:if="${!review.approved}" th:action="@{/admin/reviews/{id}/approve(id=${review.id})}" method="post" class="d-inline">
                          <button class="btn btn-sm btn-outline-success"><i class="bi bi-check-lg"></i></button>
                        </form>
                        <form th:action="@{/admin/reviews/{id}/delete(id=${review.id})}" method="post" class="d-inline">
                          <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </form>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <div class="text-center py-4" th:unless="${reviews != null and !reviews.isEmpty()}">
          <i class="bi bi-chat-quote text-muted" style="font-size: 3rem;"></i>
          <p class="text-muted mt-2">No reviews found.</p>
        </div>
      </main>
    </div>
  </div>

  <div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
