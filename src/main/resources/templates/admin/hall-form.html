<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${hall.id == null} ? 'Add Hall' : 'Edit Hall' - MovieTicket">Hall Form - MovieTicket</title>
  <div th:replace="~{fragments/styles :: styles}"></div>
</head>
<body>
  <div th:replace="~{fragments/header :: header}"></div>

  <div class="container-fluid">
    <div class="row">
      <nav class="col-lg-2 d-none d-lg-block admin-sidebar">
        <div class="nav flex-column">
          <a class="nav-link" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
          <a class="nav-link" th:href="@{/admin/movies}"><i class="bi bi-film"></i> Movies</a>
          <a class="nav-link active" th:href="@{/admin/cinemas}"><i class="bi bi-building"></i> Cinemas</a>
          <a class="nav-link" th:href="@{/admin/showtimes}"><i class="bi bi-clock"></i> Showtimes</a>
          <a class="nav-link" th:href="@{/admin/bookings}"><i class="bi bi-ticket"></i> Bookings</a>
          <a class="nav-link" th:href="@{/admin/customers}"><i class="bi bi-people"></i> Customers</a>
          <a class="nav-link" th:href="@{/admin/reviews}"><i class="bi bi-chat-quote"></i> Reviews</a>
          <a class="nav-link" th:href="@{/admin/reports}"><i class="bi bi-bar-chart"></i> Reports</a>
        </div>
      </nav>

      <main class="col-lg-10 ms-auto px-4 py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h3 class="fw-bold mb-0">
            <i class="bi bi-grid-3x3-gap"></i>
            <span th:text="${hall.id == null} ? 'Add Hall' : 'Edit Hall'">Hall Form</span>
          </h3>
          <a th:href="@{/admin/halls(cinemaId=${hall.cinema?.id})}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Back
          </a>
        </div>

        <div class="card shadow-sm">
          <div class="card-body">
            <form th:action="${hall.id == null} ? @{/admin/halls/create} : @{/admin/halls/{id}(id=${hall.id})}" th:object="${hall}" method="post" class="row g-3">
              <input type="hidden" name="cinemaId" th:value="${hall.cinema?.id} ?: ${param.cinemaId}"/>

              <div class="col-md-4">
                <label for="name" class="form-label">Hall Name <span class="text-danger">*</span></label>
                <input type="text" class="form-control" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" id="name" th:field="*{name}" placeholder="Hall 1" required/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Required</div>
              </div>
              <div class="col-md-4">
                <label for="rows" class="form-label">Number of Rows <span class="text-danger">*</span></label>
                <input type="number" class="form-control" th:classappend="${#fields.hasErrors('rows')} ? 'is-invalid'" id="rows" th:field="*{rows}" min="1" max="26" required/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('rows')}" th:errors="*{rows}">1-26</div>
              </div>
              <div class="col-md-4">
                <label for="cols" class="form-label">Number of Columns <span class="text-danger">*</span></label>
                <input type="number" class="form-control" th:classappend="${#fields.hasErrors('cols')} ? 'is-invalid'" id="cols" th:field="*{cols}" min="1" max="30" required/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('cols')}" th:errors="*{cols}">1-30</div>
              </div>
              <div class="col-md-6">
                <label for="vipSeats" class="form-label">VIP Seats (comma separated, e.g. A1,A2,A3,A4)</label>
                <input type="text" class="form-control" th:classappend="${#fields.hasErrors('vipSeats')} ? 'is-invalid'" id="vipSeats" th:field="*{vipSeats}" placeholder="A1,A2,A3,A4"/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('vipSeats')}" th:errors="*{vipSeats}">Invalid</div>
              </div>
              <div class="col-md-6">
                <label for="seatCapacity" class="form-label">Seat Capacity (auto-calculated)</label>
                <input type="number" class="form-control" id="seatCapacity" th:field="*{seatCapacity}" readonly/>
              </div>
              <div class="col-12">
                <hr/>
                <button type="submit" class="btn btn-danger">
                  <i class="bi bi-floppy"></i>
                  <span th:text="${hall.id == null} ? 'Create Hall' : 'Update Hall'">Save</span>
                </button>
                <a th:href="@{/admin/halls(cinemaId=${hall.cinema?.id} ?: ${param.cinemaId})}" class="btn btn-outline-secondary ms-2">Cancel</a>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div th:replace="~{fragments/scripts :: scripts}"></div>
  <script>
    document.getElementById('rows')?.addEventListener('input', calcCapacity);
    document.getElementById('cols')?.addEventListener('input', calcCapacity);
    function calcCapacity() {
      const rows = parseInt(document.getElementById('rows').value) || 0;
      const cols = parseInt(document.getElementById('cols').value) || 0;
      document.getElementById('seatCapacity').value = rows * cols;
    }
  </script>
</body>
</html>
