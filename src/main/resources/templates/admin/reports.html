<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reports - MovieTicket</title>
  <div th:replace="~{fragments/styles :: styles}"></div>
</head>
<body>
  <div th:replace="~{fragments/header :: header}"></div>

  <div class="container-fluid">
    <div class="row">
      <nav class="col-lg-2 d-none d-lg-block admin-sidebar">
        <div class="nav flex-column">
          <a class="nav-link" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
          <a class="nav-link" th:href="@{/admin/movies}"><i class="bi bi-film"></i> Movies</a>
          <a class="nav-link" th:href="@{/admin/cinemas}"><i class="bi bi-building"></i> Cinemas</a>
          <a class="nav-link" th:href="@{/admin/showtimes}"><i class="bi bi-clock"></i> Showtimes</a>
          <a class="nav-link" th:href="@{/admin/bookings}"><i class="bi bi-ticket"></i> Bookings</a>
          <a class="nav-link" th:href="@{/admin/customers}"><i class="bi bi-people"></i> Customers</a>
          <a class="nav-link" th:href="@{/admin/reviews}"><i class="bi bi-chat-quote"></i> Reviews</a>
          <a class="nav-link active" th:href="@{/admin/reports}"><i class="bi bi-bar-chart"></i> Reports</a>
        </div>
      </nav>

      <main class="col-lg-10 ms-auto px-4 py-4">
        <h3 class="fw-bold mb-4"><i class="bi bi-bar-chart"></i> Reports &amp; Analytics</h3>

        <div class="row g-4">
          <!-- Monthly Revenue Chart -->
          <div class="col-lg-8">
            <div class="card shadow-sm">
              <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <h5 class="fw-bold mb-0"><i class="bi bi-graph-up"></i> Monthly Revenue</h5>
                <div class="btn-group btn-group-sm">
                  <button class="btn btn-outline-secondary active" onclick="updateRevenueChart('year')">This Year</button>
                  <button class="btn btn-outline-secondary" onclick="updateRevenueChart('month')">This Month</button>
                </div>
              </div>
              <div class="card-body">
                <canvas id="revenueChart" height="320"></canvas>
              </div>
            </div>
          </div>

          <!-- Revenue by Movie -->
          <div class="col-lg-4">
            <div class="card shadow-sm">
              <div class="card-header bg-white">
                <h5 class="fw-bold mb-0"><i class="bi bi-pie-chart"></i> Revenue by Movie</h5>
              </div>
              <div class="card-body">
                <canvas id="revenueByMovieChart" height="320"></canvas>
              </div>
            </div>
          </div>

          <!-- Occupancy Rate -->
          <div class="col-lg-6">
            <div class="card shadow-sm">
              <div class="card-header bg-white">
                <h5 class="fw-bold mb-0"><i class="bi bi-building"></i> Occupancy Rate by Cinema</h5>
              </div>
              <div class="card-body">
                <canvas id="occupancyChart" height="280"></canvas>
              </div>
            </div>
          </div>

          <!-- Top Customers -->
          <div class="col-lg-6">
            <div class="card shadow-sm">
              <div class="card-header bg-white">
                <h5 class="fw-bold mb-0"><i class="bi bi-trophy"></i> Top Customers</h5>
              </div>
              <div class="card-body p-0">
                <div class="table-responsive" th:if="${topCustomers != null and !topCustomers.isEmpty()}">
                  <table class="table table-hover mb-0">
                    <thead class="table-light">
                      <tr>
                        <th>#</th>
                        <th>Customer</th>
                        <th>Bookings</th>
                        <th>Total Spent</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr th:each="entry, stat : ${topCustomers}">
                        <td th:text="${stat.index + 1}">1</td>
                        <td class="fw-semibold" th:text="${entry.key}">Customer</td>
                        <td><span class="badge bg-primary" th:text="${entry.value.bookingCount}">0</span></td>
                        <td th:text="${#numbers.formatDecimal(entry.value.totalSpent, 1, 2)}">$0.00</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
                <div class="text-center py-3" th:unless="${topCustomers != null and !topCustomers.isEmpty()}">
                  <p class="text-muted mb-0">No data yet.</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div th:replace="~{fragments/scripts :: scripts}"></div>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Revenue Chart
      const revCtx = document.getElementById('revenueChart');
      if (revCtx) {
        window.revenueChart = createBarChart(revCtx,
          JSON.parse('<th:block th:text="${#strings.escapeJavaScript(monthlyLabelsJson)}">[]</th:block>'),
          [{
            label: 'Revenue',
            data: JSON.parse('<th:block th:text="${#strings.escapeJavaScript(monthlyRevenueJson)}">[]</th:block>'),
            backgroundColor: 'rgba(229, 9, 20, 0.6)',
            borderColor: '#e50914',
            borderWidth: 2,
            borderRadius: 6
          }],
          { scales: { y: { beginAtZero: true, ticks: { callback: v => '$' + v } } } }
        );
      }

      // Revenue by Movie
      const movieCtx = document.getElementById('revenueByMovieChart');
      if (movieCtx) {
        createPieChart(movieCtx,
          JSON.parse('<th:block th:text="${#strings.escapeJavaScript(movieRevenueLabelsJson)}">[]</th:block>'),
          JSON.parse('<th:block th:text="${#strings.escapeJavaScript(movieRevenueDataJson)}">[]</th:block>'),
          ['#e50914', '#3498db', '#2ecc71', '#f1c40f', '#9b59b6', '#1abc9c', '#e67e22', '#e74c3c']
        );
      }

      // Occupancy Rate
      const occCtx = document.getElementById('occupancyChart');
      if (occCtx) {
        createBarChart(occCtx,
          JSON.parse('<th:block th:text="${#strings.escapeJavaScript(occupancyLabelsJson)}">[]</th:block>'),
          [{
            label: 'Occupancy %',
            data: JSON.parse('<th:block th:text="${#strings.escapeJavaScript(occupancyDataJson)}">[]</th:block>'),
            backgroundColor: 'rgba(52, 152, 219, 0.6)',
            borderColor: '#3498db',
            borderWidth: 2,
            borderRadius: 6
          }],
          { scales: { y: { beginAtZero: true, max: 100, ticks: { callback: v => v + '%' } } } }
        );
      }
    });

    function updateRevenueChart(period) {
      // In a real app, this would fetch new data via AJAX
      toast('Loading ' + period + ' data...', 'info');
    }
  </script>
</body>
</html>
