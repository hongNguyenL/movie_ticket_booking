<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Halls - MovieTicket</title>
  <div th:replace="~{fragments/styles :: styles}"></div>
</head>
<body>
  <div th:replace="~{fragments/header :: header}"></div>

  <div class="container-fluid">
    <div class="row">
      <nav class="col-lg-2 d-none d-lg-block admin-sidebar">
        <div class="nav flex-column">
          <a class="nav-link" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
          <a class="nav-link" th:href="@{/admin/movies}"><i class="bi bi-film"></i> Movies</a>
          <a class="nav-link active" th:href="@{/admin/cinemas}"><i class="bi bi-building"></i> Cinemas</a>
          <a class="nav-link" th:href="@{/admin/showtimes}"><i class="bi bi-clock"></i> Showtimes</a>
          <a class="nav-link" th:href="@{/admin/bookings}"><i class="bi bi-ticket"></i> Bookings</a>
          <a class="nav-link" th:href="@{/admin/customers}"><i class="bi bi-people"></i> Customers</a>
          <a class="nav-link" th:href="@{/admin/reviews}"><i class="bi bi-chat-quote"></i> Reviews</a>
          <a class="nav-link" th:href="@{/admin/reports}"><i class="bi bi-bar-chart"></i> Reports</a>
        </div>
      </nav>

      <main class="col-lg-10 ms-auto px-4 py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <h3 class="fw-bold mb-0"><i class="bi bi-grid-3x3-gap"></i> Halls</h3>
            <p class="text-muted mb-0" th:if="${cinema != null}">
              Cinema: <span class="fw-semibold" th:text="${cinema.name}">Cinema Name</span>
            </p>
          </div>
          <a th:href="@{/admin/halls/create(cinemaId=${cinema.id})}" class="btn btn-danger">
            <i class="bi bi-plus-lg"></i> Add Hall
          </a>
        </div>

        <div class="card shadow-sm">
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover mb-0">
                <thead class="table-light">
                  <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Capacity</th>
                    <th>Rows</th>
                    <th>Cols</th>
                    <th>VIP Seats</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="hall : ${halls}">
                    <td th:text="${hall.id}">1</td>
                    <td class="fw-semibold" th:text="${hall.name}">Hall 1</td>
                    <td th:text="${hall.seatCapacity}">100</td>
                    <td th:text="${hall.rows}">10</td>
                    <td th:text="${hall.cols}">10</td>
                    <td th:text="${hall.vipSeats}">A1-A4</td>
                    <td>
                      <div class="d-flex gap-1">
                        <a th:href="@{/admin/halls/{id}/edit(id=${hall.id})}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></a>
                        <a th:href="@{/admin/halls/{id}/seats(id=${hall.id})}" class="btn btn-sm btn-outline-warning">
                          <i class="bi bi-grid-3x3"></i> Layout
                        </a>
                        <button class="btn btn-sm btn-outline-danger" onclick="confirmDelete(${hall.id}, '${#strings.escapeJavaScript(hall.name)}')"><i class="bi bi-trash"></i></button>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <div class="mt-3">
          <a th:href="@{/admin/cinemas}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Back to Cinemas</a>
        </div>
      </main>
    </div>
  </div>

  <!-- Delete Modal -->
  <div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-exclamation-triangle text-danger"></i> Delete Hall</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p>Are you sure you want to delete <strong id="deleteItemName"></strong>?</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <form th:action="@{/admin/halls/delete}" method="post">
            <input type="hidden" name="id" id="deleteItemId"/>
            <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> Delete</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div th:replace="~{fragments/scripts :: scripts}"></div>
  <script>
    function confirmDelete(id, name) {
      document.getElementById('deleteItemId').value = id;
      document.getElementById('deleteItemName').textContent = name;
      new bootstrap.Modal(document.getElementById('deleteModal')).show();
    }
  </script>
</body>
</html>
