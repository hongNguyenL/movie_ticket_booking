<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Customers - MovieTicket</title>
  <div th:replace="~{fragments/styles :: styles}"></div>
</head>
<body>
  <div th:replace="~{fragments/header :: header}"></div>

  <div class="container-fluid">
    <div class="row">
      <nav class="col-lg-2 d-none d-lg-block admin-sidebar">
        <div class="nav flex-column">
          <a class="nav-link" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
          <a class="nav-link" th:href="@{/admin/movies}"><i class="bi bi-film"></i> Movies</a>
          <a class="nav-link" th:href="@{/admin/cinemas}"><i class="bi bi-building"></i> Cinemas</a>
          <a class="nav-link" th:href="@{/admin/showtimes}"><i class="bi bi-clock"></i> Showtimes</a>
          <a class="nav-link" th:href="@{/admin/bookings}"><i class="bi bi-ticket"></i> Bookings</a>
          <a class="nav-link active" th:href="@{/admin/customers}"><i class="bi bi-people"></i> Customers</a>
          <a class="nav-link" th:href="@{/admin/reviews}"><i class="bi bi-chat-quote"></i> Reviews</a>
          <a class="nav-link" th:href="@{/admin/reports}"><i class="bi bi-bar-chart"></i> Reports</a>
        </div>
      </nav>

      <main class="col-lg-10 ms-auto px-4 py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h3 class="fw-bold mb-0"><i class="bi bi-people"></i> Customers</h3>
        </div>

        <!-- Search -->
        <div class="card shadow-sm mb-4">
          <div class="card-body">
            <form th:action="@{/admin/customers}" method="get" class="row g-2">
              <div class="col-md-5">
                <input type="text" class="form-control" name="q" placeholder="Search by name, email, or username..." th:value="${param.q}"/>
              </div>
              <div class="col-md-3">
                <select class="form-select" name="enabled">
                  <option value="">All Status</option>
                  <option value="true" th:selected="${param.enabled != null and param.enabled[0] == 'true'}">Active</option>
                  <option value="false" th:selected="${param.enabled != null and param.enabled[0] == 'false'}">Locked</option>
                </select>
              </div>
              <div class="col-md-2">
                <button class="btn btn-danger w-100" type="submit"><i class="bi bi-search"></i> Search</button>
              </div>
              <div class="col-md-2">
                <a th:href="@{/admin/customers}" class="btn btn-outline-secondary w-100">Clear</a>
              </div>
            </form>
          </div>
        </div>

        <div class="card shadow-sm">
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover mb-0">
                <thead class="table-light">
                  <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Bookings</th>
                    <th>Total Spent</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="customer : ${customers}">
                    <td th:text="${customer.id}">1</td>
                    <td class="fw-semibold" th:text="${customer.fullName}">Name</td>
                    <td th:text="${customer.username}">username</td>
                    <td th:text="${customer.email}">email@example.com</td>
                    <td th:text="${customer.phone} ?: 'N/A'">Phone</td>
                    <td>N/A</td>
                    <td>N/A</td>
                    <td>
                      <span class="badge" th:classappend="${customer.enabled} ? 'bg-success' : 'bg-danger'">
                        <span th:text="${customer.enabled} ? 'Active' : 'Locked'">Active</span>
                      </span>
                    </td>
                    <td>
                      <div class="d-flex gap-1">
                        <button class="btn btn-sm" th:classappend="${customer.enabled} ? 'btn-outline-warning' : 'btn-outline-success'"
                                onclick="toggleUserStatus(${customer.id}, '${customer.username}', ${customer.enabled})">
                          <i class="bi" th:classappend="${customer.enabled} ? 'bi-lock' : 'bi-unlock'"></i>
                          <span th:text="${customer.enabled} ? 'Lock' : 'Unlock'">Lock</span>
                        </button>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- Pagination -->
        <nav class="mt-4" th:if="${totalPages > 1}">
          <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${first} ? 'disabled'"><a class="page-link" th:href="@{/admin/customers(page=0, q=${param.q}, enabled=${param.enabled})}"><i class="bi bi-chevron-double-left"></i></a></li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == number} ? 'active'"><a class="page-link" th:href="@{/admin/customers(page=${i}, q=${param.q}, enabled=${param.enabled})}" th:text="${i+1}"></a></li>
            <li class="page-item" th:classappend="${last} ? 'disabled'"><a class="page-link" th:href="@{/admin/customers(page=${totalPages - 1}, q=${param.q}, enabled=${param.enabled})}"><i class="bi bi-chevron-double-right"></i></a></li>
          </ul>
        </nav>
      </main>
    </div>
  </div>

  <!-- Toggle Status Modal -->
  <div class="modal fade" id="toggleModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="toggleModalTitle"><i class="bi bi-exclamation-triangle text-warning"></i> Confirm Action</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="toggleModalBody">
          <p>Are you sure you want to change this customer's status?</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <form th:action="@{/admin/customers/toggle-status}" method="post">
            <input type="hidden" name="id" id="toggleUserId"/>
            <button type="submit" class="btn btn-warning" id="toggleModalBtn"><i class="bi bi-lock"></i> Lock</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div th:replace="~{fragments/scripts :: scripts}"></div>
  <script>
    function toggleUserStatus(id, username, currentStatus) {
      document.getElementById('toggleUserId').value = id;
      const action = currentStatus ? 'Lock' : 'Unlock';
      document.getElementById('toggleModalTitle').innerHTML = `<i class="bi bi-exclamation-triangle text-warning"></i> ${action} User`;
      document.getElementById('toggleModalBody').innerHTML = `<p>Are you sure you want to <strong>${action.toLowerCase()}</strong> user <strong>${username}</strong>?</p>`;
      const btn = document.getElementById('toggleModalBtn');
      btn.innerHTML = `<i class="bi bi-${currentStatus ? 'lock' : 'unlock'}"></i> ${action}`;
      btn.className = `btn btn-${currentStatus ? 'warning' : 'success'}`;
      new bootstrap.Modal(document.getElementById('toggleModal')).show();
    }
  </script>
</body>
</html>
