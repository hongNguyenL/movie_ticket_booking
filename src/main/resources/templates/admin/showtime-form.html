<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${showtime.id == null} ? 'Add Showtime' : 'Edit Showtime' - MovieTicket">Showtime Form - MovieTicket</title>
  <div th:replace="~{fragments/styles :: styles}"></div>
</head>
<body>
  <div th:replace="~{fragments/header :: header}"></div>

  <div class="container-fluid">
    <div class="row">
      <nav class="col-lg-2 d-none d-lg-block admin-sidebar">
        <div class="nav flex-column">
          <a class="nav-link" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
          <a class="nav-link" th:href="@{/admin/movies}"><i class="bi bi-film"></i> Movies</a>
          <a class="nav-link" th:href="@{/admin/cinemas}"><i class="bi bi-building"></i> Cinemas</a>
          <a class="nav-link active" th:href="@{/admin/showtimes}"><i class="bi bi-clock"></i> Showtimes</a>
          <a class="nav-link" th:href="@{/admin/bookings}"><i class="bi bi-ticket"></i> Bookings</a>
          <a class="nav-link" th:href="@{/admin/customers}"><i class="bi bi-people"></i> Customers</a>
          <a class="nav-link" th:href="@{/admin/reviews}"><i class="bi bi-chat-quote"></i> Reviews</a>
          <a class="nav-link" th:href="@{/admin/reports}"><i class="bi bi-bar-chart"></i> Reports</a>
        </div>
      </nav>

      <main class="col-lg-10 ms-auto px-4 py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h3 class="fw-bold mb-0">
            <i class="bi bi-clock"></i>
            <span th:text="${showtime.id == null} ? 'Add Showtime' : 'Edit Showtime'">Showtime Form</span>
          </h3>
          <a th:href="@{/admin/showtimes}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Back
          </a>
        </div>

        <div class="card shadow-sm">
          <div class="card-body">
            <div th:if="${#fields.hasErrors('global')}" class="alert alert-danger">
              <div th:each="err : ${#fields.errors('global')}" th:text="${err}">Error</div>
            </div>

            <form th:action="${showtime.id == null} ? @{/admin/showtimes/create} : @{/admin/showtimes/{id}(id=${showtime.id})}" th:object="${showtime}" method="post" class="row g-3">
              <div class="col-md-6">
                <label for="movie" class="form-label">Movie <span class="text-danger">*</span></label>
                <select class="form-select" th:classappend="${#fields.hasErrors('movie')} ? 'is-invalid'" id="movie" th:field="*{movie}" required>
                  <option value="">Select movie...</option>
                  <option th:each="m : ${movies}" th:value="${m.id}" th:text="${m.title}" th:selected="${showtime.movie?.id == m.id}"></option>
                </select>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('movie')}" th:errors="*{movie}">Required</div>
              </div>
              <div class="col-md-6">
                <label for="price" class="form-label">Ticket Price <span class="text-danger">*</span></label>
                <div class="input-group">
                  <span class="input-group-text">$</span>
                  <input type="number" step="0.01" class="form-control" th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'" id="price" th:field="*{price}" min="0" required/>
                </div>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}">Required</div>
              </div>
              <div class="col-md-4">
                <label for="cinema" class="form-label">Cinema <span class="text-danger">*</span></label>
                <select class="form-select" th:classappend="${#fields.hasErrors('cinema')} ? 'is-invalid'" id="cinema" th:field="*{cinema}" required>
                  <option value="">Select cinema...</option>
                  <option th:each="c : ${cinemas}" th:value="${c.id}" th:text="${c.name}" th:selected="${showtime.cinema?.id == c.id}"></option>
                </select>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('cinema')}" th:errors="*{cinema}">Required</div>
              </div>
              <div class="col-md-4">
                <label for="hall" class="form-label">Hall <span class="text-danger">*</span></label>
                <select class="form-select" th:classappend="${#fields.hasErrors('hall')} ? 'is-invalid'" id="hall" th:field="*{hall}" required>
                  <option value="">Select hall...</option>
                  <option th:each="h : ${halls}" th:value="${h.id}" th:text="${h.name}" th:selected="${showtime.hall?.id == h.id}"></option>
                </select>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('hall')}" th:errors="*{hall}">Required</div>
              </div>
              <div class="col-md-4">
                <label for="startTime" class="form-label">Start Time <span class="text-danger">*</span></label>
                <input type="datetime-local" class="form-control" th:classappend="${#fields.hasErrors('startTime')} ? 'is-invalid'" id="startTime" th:field="*{startTime}" required/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('startTime')}" th:errors="*{startTime}">Required</div>
              </div>
              <div class="col-12">
                <hr/>
                <button type="submit" class="btn btn-danger">
                  <i class="bi bi-floppy"></i>
                  <span th:text="${showtime.id == null} ? 'Create Showtime' : 'Update Showtime'">Save</span>
                </button>
                <a th:href="@{/admin/showtimes}" class="btn btn-outline-secondary ms-2">Cancel</a>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div th:replace="~{fragments/scripts :: scripts}"></div>
  <script>
    document.getElementById('cinema')?.addEventListener('change', function() {
      const cinemaId = this.value;
      const hallSelect = document.getElementById('hall');
      hallSelect.innerHTML = '<option value="">Select hall...</option>';
      if (cinemaId) {
        fetch(`/api/cinemas/${cinemaId}/halls`)
          .then(r => r.json())
          .then(halls => {
            halls.forEach(h => {
              const opt = document.createElement('option');
              opt.value = h.id;
              opt.textContent = h.name;
              hallSelect.appendChild(opt);
            });
          });
      }
    });
  </script>
</body>
</html>
