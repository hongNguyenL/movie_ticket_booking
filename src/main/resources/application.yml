spring:
  application:
    name: movieticket

  datasource:
    url: jdbc:postgresql://localhost:5432/movieticket_db?TimeZone=UTC
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public

  thymeleaf:
    cache: false
    mode: HTML
    encoding: UTF-8
    prefix: classpath:/templates/
    suffix: .html

  mvc:
    static-path-pattern: /**
    hiddenmethod:
      filter:
        enabled: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: UTC

server:
  port: 8080
  servlet:
    session:
      timeout: 30m
      tracking-modes: cookie
    context-path: /

app:
  name: MovieTicket
  booking:
    payment-timeout-minutes: 10
    cancel-before-hours: 1
  upload:
    poster-dir: uploads/posters
  default-poster: /static/images/default-poster.jpg

logging:
  level:
    root: INFO
    com.nguyen.movieticket: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
